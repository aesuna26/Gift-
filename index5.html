<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Abdul</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Quicksand:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #fdf8f5, #f7e9e3);
  font-family: 'Quicksand', sans-serif;
  color: #4b3b3b;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* soft glow blobs */
.blob {
  position: absolute;
  width: 350px;
  height: 350px;
  background: rgba(255, 200, 180, 0.3);
  filter: blur(120px);
  border-radius: 50%;
  animation: float 12s infinite alternate;
}

@keyframes float {
  from { transform: translate(-80px, -40px); }
  to { transform: translate(80px, 40px); }
}

/* card */
.card {
  position: relative;
  width: 420px;
  padding: 45px;
  border-radius: 28px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(14px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);
  text-align: center;
  transition: 0.6s;
}

/* title */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem;
  margin-bottom: 10px;
}

/* script accent */
.signature {
  font-family: 'Great Vibes', cursive;
  font-size: 1.8rem;
  color: #d69a8a;
  margin-top: 10px;
}

/* text */
p {
  font-size: 1.05rem;
  line-height: 1.7;
  min-height: 70px;
}

/* button */
button {
  margin-top: 25px;
  padding: 10px 28px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg, #e6b8af, #d89c8a);
  color: white;
  font-size: 0.9rem;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* fade */
.fade {
  opacity: 0;
  transform: translateY(10px);
}
.show {
  opacity: 1;
  transform: translateY(0);
}

/* balloons */
.balloon {
  position: absolute;
  bottom: -120px;
  font-size: 22px;
  opacity: 0.5;
  animation: rise 10s linear;
}

@keyframes rise {
  to { transform: translateY(-120vh); }
}

/* final icons */
.final {
  margin-top: 15px;
  font-size: 42px;
  opacity: 0;
  transition: 1.2s;
}

.teddy {
  display: inline-block;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  50% { transform: translateY(-6px); }
}
</style>
</head>

<body>

<div class="blob"></div>

<div class="card show" id="card">
  <h1 id="title">for you</h1>
  <p id="text">tap when you're ready</p>
  <button onclick="next()">open</button>
  <div class="final" id="final"></div>
  <div class="signature" id="sign"></div>
</div>

<script>
const steps = [
  "i wanted to make something that felt like you… soft and a little special.",
  "not something loud, just something that stays.",
  "happy birthday, abdul.",
  "you slipped into my life so quietly…",
  "and somehow, you stayed in a way i didn’t expect.",
  "you’re there in small thoughts, random moments…",
  "and i’ve come to really like that.",
  "i hope today feels warm for you.",
  "not perfect… just real and happy.",
  "and i hope this year gives you more of those moments."
];

let i = 0;
const card = document.getElementById("card");

function next() {
  card.classList.remove("show");
  card.classList.add("fade");

  setTimeout(() => {
    if (i < steps.length) {
      document.getElementById("text").innerText = steps[i];
      i++;
    } else {
      document.getElementById("title").innerText = "happy birthday";
      document.getElementById("text").innerText = "i’m really glad it’s you ❤️";

      const final = document.getElementById("final");
      final.innerHTML = "🎂 <span class='teddy'>🧸</span> 🎈";
      final.style.opacity = "1";

      document.getElementById("sign").innerText = "— for you, always";

      document.querySelector("button").style.display = "none";
    }

    card.classList.remove("fade");
    card.classList.add("show");
  }, 400);
}

/* balloons */
setInterval(() => {
  const b = document.createElement("div");
  b.className = "balloon";
  b.innerText = "🎈";
  b.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(b);

  setTimeout(() => b.remove(), 10000);
}, 900);
</script>

</body>
</html>
